name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/Winche.Events.Abstractions/Winche.Events.Abstractions.csproj -c Release --no-build -o ./packages
          dotnet pack src/Winche.Events/Winche.Events.csproj -c Release --no-build -o ./packages
          dotnet pack src/Winche.Events.Commands/Winche.Events.Commands.csproj -c Release --no-build -o ./packages

      - name: Push
        run: dotnet nuget push ./packages/*.nupkg ./packages/*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
